<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC / ADA Split Signal Dashboard</title>
  <style>
    :root {
      --bg: #070a0f;
      --line: #263342;
      --text: #edf2f7;
      --muted: #90a3b8;
      --btc: #f59a23;
      --ada: #3ca4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .split-shell {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #0c1119;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .frames {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .frame-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border-right: 1px solid var(--line);
    }

    .frame-panel:last-child {
      border-right: 0;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: #0b1119;
      font-weight: 850;
      letter-spacing: 0;
    }

    .bar span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .btc strong { color: var(--btc); }
    .ada strong { color: var(--ada); }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #080b10;
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      .split-shell { height: auto; min-height: 100vh; }
      .frames { grid-template-columns: 1fr; }
      .frame-panel { height: 100vh; border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="split-shell">
    <header>
      <div>
        <h1>BTC / ADA Signal Split</h1>
        <div class="hint">左邊 BTC，右邊 ADA，各自獨立刷新。</div>
      </div>
      <div class="hint">/split.html</div>
    </header>

    <main class="frames">
      <section class="frame-panel btc">
        <div class="bar"><strong>BTCUSDT</strong><span>signal dashboard</span></div>
        <iframe title="BTC signal dashboard" src="/signal_dashboard.html?symbol=BTCUSDT&embed=1"></iframe>
      </section>
      <section class="frame-panel ada">
        <div class="bar"><strong>ADAUSDT</strong><span>signal dashboard</span></div>
        <iframe title="ADA signal dashboard" src="/signal_dashboard.html?symbol=ADAUSDT&embed=1"></iframe>
      </section>
    </main>
  </div>
</body>
</html>
